# ~/.config/herdr/config.toml
# herdr — agent-aware terminal multiplexer (replaced tmux for AI dev).
# Installed via mise (github:ogulcancelik/herdr).
#
# Most of herdr's defaults already match the old tmux setup, so they are left
# implicit here:
#   new_tab          = prefix+c          (tmux `bind c new-window`)
#   split_horizontal = prefix+minus      (tmux `bind - split -v`, stacked)
#   split_vertical   = prefix+v          (tmux used `|`; `|` isn't bindable, v instead)
#   new panes/tabs inherit the current pane's cwd (tmux `-c pane_current_path`)
#   mouse capture, vi-style scrollback — on by default
# Reload after edits with: prefix+shift+r   (prefix+r is herdr's resize mode)

onboarding = false            # skip the first-run setup prompt (written by herdr on first launch)

# ---- keybindings ----
[keys]
prefix = "ctrl+space"         # was ctrl+b (tmux); ctrl+space to avoid clashes
previous_workspace = "prefix+["   # cycle to previous workspace (unset by default)
next_workspace = "prefix+]"       # cycle to next workspace (unset by default)
previous_agent = "prefix+,"       # cycle to previous agent (unset by default; , = <)
next_agent = "prefix+."           # cycle to next agent (unset by default; . = >)

[keys.indexed]
agents = "alt"                    # alt+1..9 focuses agent row N directly

# ---- custom command popups (temporary split pane; tool's own quit key closes it) ----
# prefix+l stays focus_pane_right, so lazygit lives on prefix+alt+g.
[[keys.command]]
key = "prefix+d"                  # d = diff
type = "pane"
command = "hunk diff"             # hunkdiff — review working-tree changes (q to close)

[[keys.command]]
key = "prefix+alt+g"             # alt+g = git; prefix+g is herdr's goto
type = "pane"
command = "lazygit"

# ---- theme: blue palette matching starship / old tmux (#6c94ff) ----
[theme]
name = "tokyo-night"          # closest built-in to the old blue tmux theme

[theme.custom]
accent = "#6c94ff"            # starship blue — active pane / sidebar highlight

# ---- session persistence (replaces tmux-resurrect + tmux-continuum) ----
[session]
resume_agents_on_restore = true   # relaunch agents (claude, etc.) on restart
