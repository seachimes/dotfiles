# ~/.config/tmux/tmux.conf

# ---- terminal / colours ----
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm*:Tc"   # truecolor
set -g escape-time 10                                  # responsive nvim / ESC
set -g focus-events on
set -g history-limit 50000

# ---- general behaviour ----
set -g mouse on
set -g base-index 1                 # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on          # keep window numbers gapless
set -g set-clipboard on
set -g display-time 2000
set -g status-interval 5

# prefix stays C-b (default)

# ---- key bindings ----
# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# intuitive splits that keep the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# resize panes with prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- copy mode: vi keys + clipboard ----
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ============================================================
# Theme — blue palette matching starship (#6c94ff / #769ff0)
# ============================================================
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1d2230,fg=#a0a9cb"

set -g status-left-length 40
set -g status-left "#[bg=#6c94ff,fg=#0b0e14,bold] #S #[bg=#1d2230,fg=#6c94ff]#[default] "

set -g status-right-length 60
set -g status-right "#[fg=#394260]#[bg=#394260,fg=#769ff0] %Y-%m-%d #[fg=#6c94ff]#[bg=#6c94ff,fg=#0b0e14,bold] %H:%M "

setw -g window-status-format "#[fg=#a0a9cb] #I:#W "
setw -g window-status-current-format "#[bg=#394260,fg=#769ff0,bold] #I:#W "
setw -g window-status-separator ""

set -g pane-border-style "fg=#394260"
set -g pane-active-border-style "fg=#6c94ff"

set -g message-style "bg=#394260,fg=#ffffff"
set -g mode-style "bg=#6c94ff,fg=#0b0e14"

# ============================================================
# Plugins (tpm)
# ============================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'   # C-h/j/k/l between vim & tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # automatic save + restore

# resurrect/continuum: persist sessions across reboots (great for AI dev)
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# tpm itself is provided by chezmoi (.chezmoiexternal). Clone it as a fallback
# for non-chezmoi setups, then install the plugins on first launch if they are
# not present yet (checked via a representative plugin, since tpm's own dir
# already exists when chezmoi manages it).
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm'"
if "test ! -d ~/.config/tmux/plugins/tmux-sensible" \
   "run '~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
