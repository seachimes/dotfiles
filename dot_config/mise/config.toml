# Global tool versions. These exact pins ARE the lock for global tools — mise
# does not generate a mise.lock for the global config, so a fresh machine
# installs exactly these versions via `mise install`. Reproducible + stable.
# Downloads are still integrity-checked by the backends (aqua = checksums,
# github = provenance). Per-project mise.toml overrides these.
#
# Update deliberately:  mise up   (bumps versions) then re-commit this file:
#   chezmoi re-add ~/.config/mise/config.toml && \
#     (cd "$(chezmoi source-path)" && git commit -am "tools: bump")

[tools]
atuin = "18.16.1"
bat = "0.26.1"
bun = "1.3.14"
delta = "0.19.2"
eza = "0.23.4"
fd = "10.4.2"
fzf = "0.73.1"
gitleaks = "8.30.1"
jq = "1.8.1"
lazygit = "0.62.2"
neovim = "0.12.3"
node = "24.2.0"
ripgrep = "15.1.0"
starship = "1.25.1"
tree-sitter = "0.26.9"   # nvim-treesitter (main branch) builds parsers with this
uv = "0.11.23"
zoxide = "0.9.9"
# github backend (aqua's attestation check rejects releases that lack GitHub
# attestations, e.g. cli/cli, so install these straight from GitHub releases)
"github:cli/cli" = "2.95.0"        # gh — GitHub CLI
"github:pnpm/pnpm" = "11.8.0"      # pnpm — v11 ships tar.gz assets the aqua registry doesn't map yet
# AI tooling — rtk (token-reducing CLI proxy)
"github:rtk-ai/rtk" = "0.42.4"
"github:ogulcancelik/herdr" = "0.7.3"  # herdr — agent-aware terminal multiplexer (tmux replacement)
zig = "latest"
